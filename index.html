<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="description" content="Plan your week in 1-hour slots">
<meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff">
<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#171e2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Planner">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<title>Week Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <h1>📅 Week Planner</h1>
  <button class="icon-btn" id="btnPrev" title="Previous week">‹</button>
  <button id="btnToday">Today</button>
  <button class="icon-btn" id="btnNext" title="Next week">›</button>
  <span class="wk-label" id="wkLabel"></span>
  <span class="sync-status" id="syncStatus"></span>
  <button class="icon-btn" id="btnMenu" title="Menu">☰</button>
</header>

<div id="dayChips"></div>
<div id="gridWrap"><div id="grid"></div></div>

<div id="menu">
  <button id="mLoad">📂 Import backup file</button>
  <button id="mSave">💾 Export backup file</button>
  <hr>
  <button id="mCopyPrev">📋 Copy last week's plan</button>
  <button id="mStats">📊 Week stats</button>
  <button id="mClearWeek">🗑 Clear this week</button>
  <hr>
  <button id="mSettings">⚙️ Settings</button>
  <button id="mInstall" style="display:none">📲 Install app</button>
  <hr>
  <button id="mSignOut">👤 Sign out</button>
</div>

<!-- Entry modal -->
<div class="overlay" id="entryOverlay">
  <div class="modal">
    <h2 id="entryTitle">Add to plan</h2>
    <div class="field">
      <label>What are you doing?</label>
      <input type="text" id="eTitle" placeholder="e.g. Gold session review" autocomplete="off">
    </div>
    <div class="row2">
      <div class="field">
        <label>Start</label>
        <select id="eHour"></select>
      </div>
      <div class="field">
        <label>Duration</label>
        <select id="eDur"></select>
      </div>
    </div>
    <div class="field">
      <label>Day</label>
      <select id="eDay"></select>
    </div>
    <div class="field">
      <label>Category</label>
      <div class="cat-swatches" id="eCats"></div>
    </div>
    <div class="field">
      <label>Notes (optional)</label>
      <textarea id="eNotes" rows="2" placeholder="Anything extra worth remembering…"></textarea>
    </div>
    <div class="field">
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:14px;color:var(--text)">
        <input type="checkbox" id="eRepeat"> Repeat every week
      </label>
    </div>
    <div class="modal-actions">
      <button class="danger" id="eDelete" style="display:none">Delete</button>
      <button id="eSkip" style="display:none">Skip this week</button>
      <span class="spacer"></span>
      <button id="eCancel">Cancel</button>
      <button class="primary" id="eSave">Save</button>
    </div>
  </div>
</div>

<!-- Settings modal -->
<div class="overlay" id="setOverlay">
  <div class="modal">
    <h2>Settings</h2>
    <div class="row2">
      <div class="field">
        <label>Day starts at</label>
        <select id="sStart"></select>
      </div>
      <div class="field">
        <label>Day ends at</label>
        <select id="sEnd"></select>
      </div>
    </div>
    <div class="field">
      <label>Categories</label>
      <div id="sCats"></div>
      <button id="sAddCat" style="margin-top:4px">+ Add category</button>
    </div>
    <div class="modal-actions">
      <button id="sCancel">Cancel</button>
      <button class="primary" id="sSave">Save</button>
    </div>
  </div>
</div>

<!-- Stats modal -->
<div class="overlay" id="statOverlay">
  <div class="modal">
    <h2>This week by category</h2>
    <div id="statBody"></div>
    <div class="modal-actions">
      <button class="primary" id="statClose">Close</button>
    </div>
  </div>
</div>

<div id="toast"></div>
<input type="file" id="filePick" accept=".json" style="display:none">

<!-- Auth screen -->
<div id="authScreen">
  <div class="auth-card">
    <h2>📅 Week Planner</h2>
    <p class="sub" id="authSub">Sign in to your planner</p>
    <input type="email" id="aEmail" placeholder="Email" autocomplete="email">
    <input type="password" id="aPass" placeholder="Password (6+ characters)" autocomplete="current-password">
    <div class="auth-err" id="authErr"></div>
    <button class="primary" id="aGo">Sign in</button>
    <button class="auth-toggle" id="aToggle">New here? Create an account</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="app.js"></script>
</body>
</html>
